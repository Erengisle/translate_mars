<!DOCTYPE html>
<html lang="sv">

<head>
<meta charset="UTF-8">
<title>Translate Mars</title>

<link rel="stylesheet" href="style.css">

<!-- QR kod bibliotek -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="container">

<h1>🌍 Translate Mars</h1>

<textarea id="text" placeholder="Skriv svensk text här..."></textarea>

<div class="buttons">

<button onclick="translate()">Översätt</button>

<button onclick="translateAll()">Alla språk</button>

<button onclick="printQR()">Skriv ut QR</button>

</div>

<br>

<select id="favorites">
<option>Favoriter</option>
</select>

<button onclick="saveFavorite()">Spara favorit</button>

<h2>Språk</h2>

<div id="languages"></div>

<h2>Översättningar</h2>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
