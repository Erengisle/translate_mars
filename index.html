<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Översättning</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 15px;
      font-size: 16px;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
      resize: vertical;
      font-family: inherit;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin-bottom: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .languages {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .lang-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
    }
    .lang-checkbox:hover {
      border-color: #667eea;
      background: #f8f9ff;
    }
    .results {
      display: grid;
      gap: 15px;
      margin-top: 20px;
    }
    .card {
      background: #f8f9ff;
      border-radius: 8px;
      padding: 15px;
      border: 2px solid #e0e0e0;
      transition: all 0.3s;
    }
    .card:hover {
      border-color: #667eea;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    .card-header {
      display: flex;
      align-items: center;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 16px;
    }
    .card-header span {
      font-size: 24px;
      margin-right: 8px;
    }
    .card-text {
      background: white;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.6;
      user-select: text;
    }
    .copy-btn {
      margin-top: 10px;
      padding: 6px 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #667eea;
      background: white;
      color: #667eea;
      cursor: pointer;
    }
    .copy-btn:hover {
      background: #667eea;
      color: white;
    }
    .loading {
      text-align: center;
      color: #fff;
      font-size: 16px;
      padding: 30px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌍 Översättning</h1>
    <textarea id="sourceText" placeholder="Skriv eller klistra in texten här..."></textarea>

    <div class="languages" id="languageContainer">
      <!-- Kryssrutor fylls i JS -->
    </div>

    <button id="translateBtn">Översätt</button>

    <div id="results" class="results"></div>
    <div id="loading" class="loading" style="display:none;">Översätter...</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
