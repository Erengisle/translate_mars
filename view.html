<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Håkans översättningar</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #f5f4f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.card {
  max-width: 640px;
  width: 100%;
  background: #fff;
  border: 1px solid #e4e2dd;
  border-radius: 24px;
  padding: 48px 44px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  text-align: center;
  animation: up 0.4s ease both;
}
@keyframes up {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #5b4bff;
  background: rgba(91,75,255,0.08);
  padding: 5px 14px;
  border-radius: 100px;
  margin-bottom: 28px;
}
.text {
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 500;
  line-height: 1.6;
  color: #1a1a2e;
}
.loading { color: #bbbbc8; font-style: italic; font-weight: 400; }
.footer {
  margin-top: 32px;
  font-size: 12px;
  color: #bbbbc8;
}
</style>
</head>
<body>
<div class="card">
  <div class="badge">🌍 Översättning</div>
  <div id="text" class="text"><span class="loading">Hämtar…</span></div>
  <div class="footer">Håkans översättningar</div>
</div>
<script>
const supabase = "https://nyqxplfhrzydxnwhvhco.supabase.co"
const anon = "DIN_SUPABASE_ANON_KEY"
const params = new URLSearchParams(location.search)
const id = params.get("id")
fetch(`${supabase}/rest/v1/translations?id=eq.${id}&select=translation`, {
  headers: { apikey: anon, Authorization: `Bearer ${anon}` }
})
.then(r => r.json())
.then(d => {
  document.getElementById("text").innerText = d[0]?.translation ?? "Översättning hittades inte."
})
.catch(() => {
  document.getElementById("text").innerText = "Kunde inte hämta översättning."
})
</script>
</body>
</html>
